# Monitor cadence
MONITOR_INTERVAL_SECONDS=2

# Risk scoring rules
MAX_MEMORY_KB=98304
MAX_FD_COUNT=36
MAX_SOCKET_COUNT=32
MAX_THREADS=18
MAX_CPU_PERCENT=45
MAX_MEMORY_GROWTH_KB=32768
MAX_FD_GROWTH=12
MAX_CHILDREN_PER_PPID=8
MIN_ALERT_SCORE=40
ALERT_PERSISTENCE_CYCLES=1

# Response policy
# observe | pause | terminate | kill
ACTION_MODE=observe
TERMINATE_GRACE_MS=1500
ALLOW_CROSS_UID_ACTION=0

# Sandbox review stage
SANDBOX_MEMORY_KB=131072
SANDBOX_FD_LIMIT=64
SANDBOX_CPU_SECONDS=15
SANDBOX_EVAL_SECONDS=8

# Disabled by default because promotion executes the same command again
SANDBOX_PROMOTE_AFTER_CLEAN=0
